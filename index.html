<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>小提琴把位调性指位筛选</title>
    <link rel="stylesheet" href="styles.css?v=20260610-svg-redraw">
    <script src="app.js?v=20260610-svg-redraw" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-labelledby="app-title">
        <div class="brand-block">
          <p class="eyebrow">Violin Position Map</p>
          <h1 id="app-title">小提琴把位调性指位筛选</h1>
        </div>

        <form class="filters" id="filters">
          <fieldset class="field-group">
            <legend>调式</legend>
            <div class="segmented" role="radiogroup" aria-label="调式">
              <label>
                <input type="radio" name="mode" value="major" checked>
                <span>大调</span>
              </label>
              <label>
                <input type="radio" name="mode" value="minor">
                <span>小调</span>
              </label>
            </div>
          </fieldset>

          <label class="field">
            <span>主音</span>
            <select id="tonic" name="tonic"></select>
          </label>

          <label class="field">
            <span>把位</span>
            <select id="position" name="position">
              <option value="1">一把位</option>
              <option value="2">二把位</option>
              <option value="3">三把位</option>
              <option value="4">四把位</option>
              <option value="5">五把位</option>
              <option value="6">六把位</option>
              <option value="7">七把位</option>
              <option value="all">全部把位</option>
            </select>
          </label>

          <button class="reset-button" type="button" id="reset">重置</button>
        </form>
      </section>

      <section class="result-panel" aria-live="polite">
        <div class="result-head">
          <div>
            <p class="eyebrow">Matched Diagrams</p>
            <h2 id="result-title">一把位 C大调</h2>
          </div>
        </div>

        <div id="minor-note" class="minor-note" hidden></div>
        <div id="results" class="diagram-grid"></div>
      </section>
    </main>
  </body>
</html>
