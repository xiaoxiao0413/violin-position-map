<!doctype html>
<html lang="en" data-default-lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Violin Fingerboard Chart · Position Map · Circle of Fifths</title>
    <meta name="description" content="Interactive violin fingerboard chart for scales, keys, and positions. Find finger patterns by key, mode, and position, with a circle of fifths reference.">
    <link rel="canonical" href="https://xiaoxiao0413.github.io/violin-position-map/">
    <link rel="alternate" hreflang="en" href="https://xiaoxiao0413.github.io/violin-position-map/">
    <link rel="alternate" hreflang="x-default" href="https://xiaoxiao0413.github.io/violin-position-map/">
    <meta property="og:title" content="Violin Fingerboard Chart · Position Map · Circle of Fifths">
    <meta property="og:description" content="Interactive violin fingerboard chart for scales, keys, and positions, with a circle of fifths reference.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://xiaoxiao0413.github.io/violin-position-map/">
    <link rel="stylesheet" href="styles.css?v=20260624-v5colors">
    <script src="app.js?v=20260624-v5colors" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <label class="language-control" for="language" aria-label="Language">
        <span class="language-icon" aria-hidden="true">◎</span>
        <select id="language" name="language">
          <option value="zh-Hans">简</option>
          <option value="zh-Hant">繁</option>
          <option value="en" selected>en</option>
        </select>
      </label>

      <section class="control-panel" aria-labelledby="app-title">
        <div class="brand-block">
          <p class="eyebrow" data-i18n="brandEyebrow">Violin Fingerboard Chart</p>
          <h1 id="app-title" data-i18n="appTitle">Violin Fingerboard Chart</h1>
        </div>

        <section class="fifths-wheel" aria-labelledby="fifths-title">
          <h2 id="fifths-title" data-i18n="circleTitle">Circle of Fifths for Violin</h2>
          <svg class="fifths-svg" viewBox="0 0 250 250" role="img" aria-label="Circle of Fifths">
            <circle class="fifths-ring" cx="125" cy="125" r="92" />
            <circle class="fifths-inner-ring" cx="125" cy="125" r="56" />
            <g class="fifths-major">
              <text x="125" y="17" data-key="c">C</text>
              <text x="179" y="31" data-key="g">G</text>
              <text x="219" y="71" data-key="d">D</text>
              <text x="233" y="125" data-key="a">A</text>
              <text x="219" y="179" data-key="e">E</text>
              <text x="179" y="214" data-key="b"><tspan x="179">B</tspan><tspan class="fifths-alt" x="179" dy="11">(C♭)</tspan></text>
              <text x="125" y="228" data-key="fs"><tspan x="125">F♯</tspan><tspan class="fifths-alt" x="125" dy="11">(G♭)</tspan></text>
              <text x="71" y="214" data-key="db"><tspan x="71">D♭</tspan><tspan class="fifths-alt" x="71" dy="11">(C♯)</tspan></text>
              <text x="31" y="179" data-key="ab">A♭</text>
              <text x="17" y="125" data-key="eb">E♭</text>
              <text x="31" y="71" data-key="bb">B♭</text>
              <text x="71" y="31" data-key="f">F</text>
            </g>
            <g class="fifths-minor">
              <text x="125" y="53" data-key="a">a</text>
              <text x="161" y="63" data-key="e">e</text>
              <text x="187" y="89" data-key="b">b</text>
              <text x="197" y="125" data-key="fs">f♯</text>
              <text x="187" y="161" data-key="cs">c♯</text>
              <text x="161" y="187" data-key="gs">g♯</text>
              <text x="125" y="193" data-key="ds"><tspan x="125">d♯</tspan><tspan class="fifths-alt" x="125" dy="9">(e♭)</tspan></text>
              <text x="89" y="183" data-key="bb"><tspan x="89">b♭</tspan><tspan class="fifths-alt" x="89" dy="9">(a♯)</tspan></text>
              <text x="63" y="161" data-key="f">f</text>
              <text x="53" y="125" data-key="c">c</text>
              <text x="63" y="89" data-key="g">g</text>
              <text x="89" y="63" data-key="d">d</text>
            </g>
            <text class="fifths-center" x="125" y="121" data-i18n="circleCenter">Fifths</text>
            <text class="fifths-center-sub" x="125" y="138" data-i18n="circleSub">Major / minor</text>
          </svg>
        </section>

        <form class="filters" id="filters">

          <fieldset class="field-group">
            <legend data-i18n="modeLabel">Mode</legend>
            <div class="segmented mode-segmented" role="radiogroup" aria-label="Mode">
              <label>
                <input type="radio" name="mode" value="major" checked>
                <span data-i18n="majorMode">Major</span>
              </label>
              <label>
                <input type="radio" name="mode" value="minor">
                <span data-i18n="minorMode">Minor</span>
              </label>
            </div>
          </fieldset>

          <label class="field">
            <span data-i18n="tonicLabel">Tonic</span>
            <select id="tonic" name="tonic"></select>
          </label>

          <label class="field">
            <span data-i18n="positionLabel">Position</span>
            <select id="position" name="position"></select>
          </label>

          <button class="reset-button" type="button" id="reset" data-i18n="resetButton">Reset filters</button>
        </form>
      </section>

      <section class="result-panel" aria-live="polite">
        <div class="result-head">
          <div>
            <p class="eyebrow" data-i18n="chartsEyebrow">Results</p>
            <h2 id="result-title">All Keys · Major</h2>
          </div>
        </div>

        <div id="results" class="diagram-grid"></div>
      </section>
    </main>
  </body>
</html>
